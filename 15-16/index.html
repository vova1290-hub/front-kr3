<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заметки - PWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
    <link rel="apple-touch-icon" href="icons/icon-152.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Мои заметки</h1>
            <div class="tabs">
                <button id="home-btn" class="tab active">Главная</button>
                <button id="about-btn" class="tab">О приложении</button>
            </div>
        </header>
        
        <main id="app-content">
            
        </main>

        <div class="notification-buttons">
            <button id="enable-push" class="btn-push enable">Включить уведомления</button>
            <button id="disable-push" class="btn-push disable" style="display:none;">Отключить уведомления</button>
        </div>
        
        <div id="status"></div>
    </div>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
